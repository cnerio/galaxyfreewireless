<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square: brand navy -->
  <rect width="64" height="64" rx="10" fill="#003366"/>

  <!--
    AA chevron mark — two stacked angular stripes mirroring the logo's
    left-facing bracket element, rendered in white with a red accent.
    The shape is two bold diagonal bars meeting at a central V-point,
    identical in proportion to the mark in AALogo.png.
  -->

  <!-- Upper-diagonal bar of the chevron (white) -->
  <polygon points="12,12  26,12  38,30  24,30" fill="white"/>
  <!-- Lower-diagonal bar of the chevron (white) -->
  <polygon points="12,52  26,52  38,34  24,34" fill="white"/>

  <!-- Thin accent stripe offset to the right (brand red) -->
  <polygon points="28,12  36,12  48,30  40,30" fill="#D12027"/>
  <polygon points="28,52  36,52  48,34  40,34" fill="#D12027"/>
</svg>
